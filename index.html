<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>คำศัพท์จีน HSK 1–2</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="คำศัพท์ภาษาจีน HSK 1–2 พร้อมพินอิน คำอ่านไทย คำแปล และปุ่มออกเสียง">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="HSK 1–2">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #1a1a2e;
    --paper:    #f7f4ef;
    --red:      #c0392b;
    --red-soft: #f5e6e4;
    --gold:     #b8860b;
    --mist:     #e8e4dc;
    --mid:      #7a7068;
    --card-bg:  #ffffff;
    --hsk1:     #c0392b;
    --hsk2:     #2980b9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans Thai', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    padding: 2rem 1.5rem 1.6rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '汉';
    position: absolute;
    right: -0.2rem;
    top: -1rem;
    font-family: 'Noto Serif TC', serif;
    font-size: 9rem;
    color: rgba(255,255,255,0.04);
    pointer-events: none;
    line-height: 1;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.8rem;
    color: #fff;
    letter-spacing: 0.04em;
  }
  header p {
    color: rgba(255,255,255,0.55);
    font-size: 0.82rem;
    margin-top: 0.35rem;
    font-weight: 300;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    padding: 1.2rem 1.5rem;
    background: var(--mist);
    border-bottom: 1px solid #ddd8ce;
    align-items: center;
  }
  .filter-group {
    display: flex;
    gap: 0.5rem;
  }
  .filter-btn {
    padding: 0.45rem 1rem;
    border-radius: 20px;
    border: 1.5px solid transparent;
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
    background: #fff;
    color: var(--mid);
    border-color: #ccc7be;
  }
  .filter-btn.active-all  { background: var(--ink); color: #fff; border-color: var(--ink); }
  .filter-btn.active-hsk1 { background: var(--hsk1); color: #fff; border-color: var(--hsk1); }
  .filter-btn.active-hsk2 { background: var(--hsk2); color: #fff; border-color: var(--hsk2); }

  .count-label {
    font-size: 0.78rem;
    color: var(--mid);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── TABLE ── */
  .table-wrap {
    overflow-x: auto;
    padding: 1.2rem 1.5rem 3rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  thead th {
    background: var(--ink);
    color: rgba(255,255,255,0.85);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.8rem 1rem;
    text-align: left;
    font-weight: 600;
  }
  thead th:nth-child(1) { width: 55px; text-align: center; }
  thead th:nth-child(2) { width: 90px; }
  thead th:nth-child(3) { width: 110px; }
  thead th:nth-child(4) { }
  thead th:nth-child(5) { width: 56px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid #eee9e0;
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f4; }

  td {
    padding: 0.75rem 1rem;
    vertical-align: middle;
  }

  /* level badge */
  .level {
    display: inline-block;
    font-size: 0.67rem;
    font-weight: 700;
    padding: 0.18rem 0.5rem;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .level-1 { background: var(--red-soft); color: var(--red); }
  .level-2 { background: #ddeef8; color: #1a6fa0; }

  /* chinese character */
  .hanzi {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  /* pinyin */
  .pinyin {
    font-size: 0.82rem;
    color: var(--red);
    letter-spacing: 0.03em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* thai */
  .thai {
    font-size: 0.88rem;
    color: #333;
    line-height: 1.4;
  }
  .category {
    font-size: 0.68rem;
    color: var(--mid);
    margin-top: 0.15rem;
  }

  /* speak button */
  .speak-btn {
    background: none;
    border: 1.5px solid var(--mist);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin: auto;
    color: var(--red);
  }
  .speak-btn svg { width: 17px; height: 17px; }
  .speak-btn:hover  { background: var(--red-soft); border-color: var(--red); }
  .speak-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
  .speak-btn .wave { transition: opacity 0.15s; }
  .speak-btn.active .wave { animation: wavePulse 0.8s ease-in-out infinite; }
  .speak-btn.active .wave-2 { animation-delay: 0.15s; }
  @keyframes wavePulse {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 1; }
  }

  /* no results */
  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--mid);
    font-size: 0.9rem;
    display: none;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .hanzi { font-size: 1.2rem; }
    td { padding: 0.6rem 0.6rem; }
    thead th { padding: 0.7rem 0.6rem; font-size: 0.65rem; }
  }
</style>
</head>

<header>

let currentFilter = 'all';

// สลับลำดับคำใหม่ทุกครั้งที่เปิดหน้า (Fisher–Yates)
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(vocab);

function speak(hanzi, ev) {
  const btn = ev.currentTarget;
  window.speechSynthesis.cancel();
  // เคลียร์สถานะ active ของปุ่มอื่นก่อน กันค้างแดงเวลา cancel/onend ไม่ทำงาน
  document.querySelectorAll('.speak-btn.active').forEach(b => b.classList.remove('active'));
  const utter = new SpeechSynthesisUtterance(hanzi);
  utter.lang = 'zh-CN';
  utter.rate = 0.6;
  utter.pitch = 1.1;

  // เลือกเสียงผู้หญิงจีน
  const voices = window.speechSynthesis.getVoices();
  const femaleVoice = voices.find(v =>
    v.lang.startsWith('zh') && /female|woman|Ting-Ting|Meijia|Sinji|Ya-Ling|Hanhan|Lili|Tingting/i.test(v.name)
  ) || voices.find(v =>
    v.lang.startsWith('zh')
  );
  if (femaleVoice) utter.voice = femaleVoice;

  btn.classList.add('active');
  const clear = () => btn.classList.remove('active');
  utter.onend = clear;
  utter.onerror = clear;
  window.speechSynthesis.speak(utter);
}

// โหลดเสียงล่วงหน้า (Chrome โหลด async)
window.speechSynthesis.getVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function renderTable() {
  const tbody = document.getElementById('vocabBody');
  const noRes = document.getElementById('noResults');
  const filtered = vocab.filter(v =>
    currentFilter === 'all' || v.l === parseInt(currentFilter)
  );

  document.getElementById('countLabel').textContent =
    `แสดง ${filtered.length} / ${vocab.length} คำ`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  tbody.innerHTML = filtered.map(v => `
    <tr>
      <td style="text-align:center">
        <span class="level level-${v.l}">HSK ${v.l}</span>
      </td>
      <td>
        <div class="hanzi">${v.h}</div>
      </td>
      <td>
        <div class="pinyin">${v.p}</div>
        <div class="category" style="margin-top:2px;font-size:0.75rem;color:#b0a898">${v.r}</div>
      </td>
      <td>
        <div class="thai">${v.t}</div>
        <div class="category">${v.c}</div>
      </td>
      <td>
        <button class="speak-btn" onclick="speak('${v.h}', event)" title="ฟังเสียง" aria-label="ฟังเสียง ${v.h}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path class="wave wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path class="wave wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </button>
      </td>
    </tr>
  `).join('');
}

// filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.level;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    if (currentFilter === 'all') btn.classList.add('active-all');
    else if (currentFilter === '1') btn.classList.add('active-hsk1');
    else btn.classList.add('active-hsk2');
    renderTable();
  });
});

renderTable();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
